<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoilerHealth Blogs | Tips, Maintenance & Safety</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf9;
  --bg-warm:#f5f5f4;
  --surface:#ffffff;
  --text:#1c1917;
  --text-secondary:#57534e;
  --text-tertiary:#a8a29e;
  --accent-warm:#78716c;
  --border:#e7e5e4;
  --radius:16px;
  --radius-sm:10px;
  --accent-orange:#ff8c00;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:"Inter",-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:16px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}

/* Scroll Progress */
.scroll-progress{
  position:fixed;
  top:0;left:0;
  height:2px;
  background:linear-gradient(90deg,var(--text),var(--accent-warm));
  z-index:9999;
  width:0%;
  will-change:width;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{
  from{opacity:0;transform:translate3d(0,30px,0)}
  to{opacity:1;transform:translate3d(0,0,0)}
}
@keyframes charReveal{
  from{opacity:0;transform:translate3d(0,20px,0)}
  to{opacity:1;transform:translate3d(0,0,0)}
}
@keyframes shimmer{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
}
@keyframes scaleReveal{
  from{opacity:0;transform:scale(.92) translate3d(0,20px,0)}
  to{opacity:1;transform:scale(1) translate3d(0,0,0)}
}
@keyframes slideRight{
  from{opacity:0;transform:translate3d(-30px,0,0)}
  to{opacity:1;transform:translate3d(0,0,0)}
}

.reveal{
  opacity:0;
  transform:translate3d(0,20px,0);
  transition:opacity .6s ease,transform .6s ease;
  will-change:opacity,transform;
}
.reveal.revealed{
  opacity:1;
  transform:translate3d(0,0,0)
}
.reveal-scale{
  opacity:0;
  transform:scale(.92) translate3d(0,20px,0);
  transition:opacity .7s ease,transform .7s ease;
  will-change:opacity,transform;
}
.reveal-scale.revealed{
  opacity:1;
  transform:scale(1) translate3d(0,0,0)
}
.stagger-1{transition-delay:.1s}
.stagger-2{transition-delay:.2s}
.stagger-3{transition-delay:.3s}
.stagger-4{transition-delay:.4s}
.stagger-5{transition-delay:.5s}
.stagger-6{transition-delay:.6s}

/* ===== HEADER ===== */
.site-header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px 0;
  position:sticky;
  top:0;
  z-index:100;
}
.header-inner{
  max-width:1280px;
  margin:auto;
  padding:0 32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  font-size:20px;
  font-weight:800;
  color:var(--text);
  letter-spacing:-.3px;
}
.logo span{
  color:var(--accent-orange);
  background:linear-gradient(90deg,var(--accent-orange),#ffb347,var(--accent-orange));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 4s linear infinite;
}
.main-nav{
  display:flex;
  gap:28px;
  align-items:center;
}
.main-nav a{
  color:var(--text-secondary);
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  transition:color .2s ease;
  position:relative;
}
.main-nav a::after{
  content:'';
  position:absolute;
  bottom:-4px;
  left:0;
  width:0;
  height:1.5px;
  background:var(--text);
  transition:width .3s ease;
}
.main-nav a:hover{
  color:var(--text);
}
.main-nav a:hover::after{
  width:100%;
}
.nav-btn{
  background:var(--text);
  color:var(--bg);
  padding:10px 22px;
  border-radius:var(--radius-sm);
  font-weight:700;
  font-size:13px;
  text-decoration:none;
  transition:all .25s ease;
  letter-spacing:.3px;
}
.nav-btn:hover{
  transform:translate3d(0,-2px,0);
  background:var(--accent-warm);
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}

/* ===== HERO ===== */
.blog-hero{
  max-width:1280px;
  margin:0 auto;
  padding:80px 32px 50px;
  text-align:center;
}
.blog-hero h1{
  font-size:clamp(36px,5vw,64px);
  font-weight:400;
  letter-spacing:-.03em;
  line-height:1.1;
  margin-bottom:16px;
}
.blog-hero h1 .word{
  display:inline-block;
  overflow:hidden;
  margin-right:.2em;
}
.blog-hero h1 .word span{
  display:inline-block;
  animation:charReveal .5s ease both;
}
.blog-hero h1 .word:nth-child(1) span{animation-delay:.2s}
.blog-hero h1 .word:nth-child(2) span{animation-delay:.3s}
.blog-hero h1 strong{
  font-weight:500;
  color:var(--accent-warm);
}
.blog-hero p{
  max-width:560px;
  margin:0 auto;
  font-size:17px;
  color:var(--text-secondary);
  line-height:1.7;
  animation:fadeUp .6s ease .6s both;
}

/* ===== FILTERS ===== */
.filters{
  max-width:1280px;
  margin:0 auto;
  padding:0 32px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:40px;
}
.filter-btn{
  padding:10px 24px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:100px;
  color:var(--text-secondary);
  font-size:13px;
  cursor:pointer;
  transition:all .3s ease;
  font-weight:600;
  font-family:inherit;
  letter-spacing:.3px;
}
.filter-btn:hover{
  border-color:var(--text-tertiary);
  color:var(--text);
  transform:translate3d(0,-2px,0);
}
.filter-btn.active{
  background:var(--text);
  border-color:var(--text);
  color:var(--bg);
  box-shadow:0 4px 16px rgba(0,0,0,.1);
}

/* Refresh Button */
.refresh-wrap{
  max-width:1280px;
  margin:0 auto 30px;
  padding:0 32px;
  text-align:center;
}
.refresh-btn{
  padding:8px 18px;
  background:var(--bg-warm);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-secondary);
  font-size:13px;
  cursor:pointer;
  transition:all .2s ease;
  font-family:inherit;
  font-weight:500;
}
.refresh-btn:hover{
  background:var(--surface);
  color:var(--text);
  border-color:var(--text-tertiary);
}

/* ===== BLOG GRID ===== */
.blog-section{
  max-width:1280px;
  margin:0 auto;
  padding:0 32px 60px;
}
.blog-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
}
@media(max-width:1024px){
  .blog-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .blog-grid{grid-template-columns:1fr}
}

/* Blog Card */
.blog-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  transition:all .5s cubic-bezier(0.16,1,0.3,1);
  cursor:pointer;
  position:relative;
  transform:translate3d(0,0,0);
}
.blog-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,var(--text),var(--accent-warm));
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .6s ease;
  z-index:2;
}
.blog-card:hover::before{
  transform:scaleX(1);
}
.blog-card:hover{
  transform:translate3d(0,-8px,0);
  border-color:#d6d3d1;
  box-shadow:0 20px 60px rgba(0,0,0,.1);
}
.blog-img-wrap{
  width:100%;
  height:220px;
  overflow:hidden;
  position:relative;
  background:var(--bg-warm);
}
.blog-img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform .6s ease;
}
.blog-card:hover .blog-img{
  transform:scale(1.08);
}
.blog-body{
  padding:28px;
}
.blog-meta{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:14px;
  font-size:12px;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:500;
}
.blog-category{
  background:var(--text);
  color:var(--bg);
  padding:4px 12px;
  border-radius:20px;
  font-weight:700;
  font-size:10px;
  letter-spacing:.5px;
}
.blog-card h3{
  font-size:20px;
  font-weight:600;
  margin-bottom:10px;
  line-height:1.35;
  letter-spacing:-.3px;
  transition:color .2s ease;
}
.blog-card:hover h3{
  color:var(--accent-warm);
}
.blog-card p{
  color:var(--text-secondary);
  font-size:14px;
  line-height:1.65;
  margin-bottom:18px;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.read-more{
  color:var(--text);
  font-weight:700;
  font-size:13px;
  display:inline-flex;
  align-items:center;
  gap:6px;
  letter-spacing:.3px;
  transition:all .3s ease;
}
.read-more::after{
  content:"→";
  transition:transform .3s ease;
}
.blog-card:hover .read-more{
  color:var(--accent-orange);
}
.blog-card:hover .read-more::after{
  transform:translateX(4px);
}

/* Loading & Error */
.loading{
  text-align:center;
  padding:80px 20px;
  color:var(--text-tertiary);
  font-size:16px;
  grid-column:1 / -1;
}
.error{
  text-align:center;
  padding:60px 20px;
  color:#dc2626;
  font-size:16px;
  grid-column:1 / -1;
}
.error button{
  margin-top:16px;
  padding:12px 24px;
  background:var(--text);
  border:none;
  border-radius:var(--radius-sm);
  color:var(--bg);
  font-weight:700;
  cursor:pointer;
  transition:all .2s ease;
}
.error button:hover{
  background:var(--accent-warm);
  transform:translate3d(0,-2px,0);
}

/* ===== MODAL ===== */
.modal-overlay{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(28,25,23,.85);
  z-index:200;
  overflow-y:auto;
  opacity:0;
  transition:opacity .4s ease;
}
.modal-overlay.active{
  display:block;
  opacity:1;
}
.modal-content{
  background:var(--surface);
  max-width:800px;
  margin:60px auto;
  border-radius:var(--radius);
  border:1px solid var(--border);
  overflow:hidden;
  position:relative;
  transform:translate3d(0,40px,0) scale(.96);
  transition:all .5s cubic-bezier(0.16,1,0.3,1);
}
.modal-overlay.active .modal-content{
  transform:translate3d(0,0,0) scale(1);
}
.modal-img-wrap{
  width:100%;
  height:350px;
  overflow:hidden;
  background:var(--bg-warm);
}
.modal-img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.modal-body{
  padding:48px;
}
.modal-body .blog-meta{
  margin-bottom:20px;
}
.modal-body h2{
  font-size:32px;
  font-weight:600;
  margin-bottom:24px;
  line-height:1.2;
  letter-spacing:-.5px;
}
.modal-body .post-content{
  color:var(--text-secondary);
  font-size:16px;
  line-height:1.8;
}
.modal-body .post-content p{
  margin-bottom:18px;
}
.modal-body .post-content h2,
.modal-body .post-content h3{
  color:var(--text);
  margin:32px 0 14px;
  font-size:24px;
  font-weight:600;
  letter-spacing:-.3px;
}
.modal-body .post-content h3{
  font-size:20px;
}
.modal-body .post-content ul{
  margin:16px 0 16px 28px;
  color:var(--text-secondary);
}
.modal-body .post-content li{
  margin-bottom:10px;
  position:relative;
}
.modal-body .post-content li::marker{
  color:var(--accent-orange);
}
.close-modal{
  position:absolute;
  top:20px;
  right:20px;
  width:48px;
  height:48px;
  background:rgba(255,255,255,.95);
  border:none;
  border-radius:50%;
  color:var(--text);
  font-size:24px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .3s ease;
  z-index:10;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
}
.close-modal:hover{
  background:var(--text);
  color:var(--bg);
  transform:rotate(90deg) scale(1.1);
}

/* ===== FOOTER ===== */
.site-footer{
  background:var(--bg-warm);
  border-top:1px solid var(--border);
  padding:40px 32px;
  text-align:center;
}
.site-footer p{
  color:var(--text-tertiary);
  font-size:13px;
  letter-spacing:.3px;
}

/* Responsive */
@media(max-width:768px){
  .header-inner{padding:0 20px}
  .main-nav a:not(.nav-btn){display:none}
  .blog-hero{padding:60px 20px 40px}
  .blog-hero h1{font-size:36px}
  .filters{padding:0 20px}
  .blog-section{padding:0 20px 40px}
  .modal-body{padding:28px}
  .modal-img-wrap{height:220px}
  .modal-body h2{font-size:24px}
}
</style>
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>

<!-- ===== HERO ===== -->
<div class="blog-hero">
  <h1>
    <span class="word"><span>BoilerHealth</span></span>
    <span class="word"><span><strong>Blogs</strong></span></span>
  </h1>
  <p>Keep your boiler running efficiently all year round.</p>
</div>

<!-- ===== FILTERS ===== -->
<div class="filters">
  <button class="filter-btn active" onclick="filterPosts('all')">All Posts</button>
  <button class="filter-btn" onclick="filterPosts('Maintenance')">Maintenance</button>
  <button class="filter-btn" onclick="filterPosts('Safety')">Safety</button>
  <button class="filter-btn" onclick="filterPosts('Tips')">Tips</button>
  <button class="filter-btn" onclick="filterPosts('News')">News</button>
</div>

<!-- ===== REFRESH ===== -->
<div class="refresh-wrap">
  <button class="refresh-btn" onclick="loadPosts()">↻ Refresh Posts</button>
</div>

<!-- ===== BLOG GRID ===== -->
<div class="blog-section">
  <div id="blogGrid" class="blog-grid">
    <div class="loading">Loading posts...</div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div id="postModal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="close-modal" onclick="closeModal()">×</button>
    <div class="modal-img-wrap">
      <img id="modalImg" class="modal-img" src="" alt="">
    </div>
    <div class="modal-body">
      <div class="blog-meta">
        <span id="modalCategory" class="blog-category"></span>
        <span id="modalDate"></span>
      </div>
      <h2 id="modalTitle"></h2>
      <div id="modalContent" class="post-content"></div>
    </div>
  </div>
</div>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
  <p>© 2026 BoilerHealth. All Rights Reserved.</p>
</footer>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWx2WBmUWZ9li2WKGUMagEJwgJMepc6TXQn9O_UxaEka7VRnM1iSlQZDHRkckK1k_V/exec";
let allPosts = [];

async function loadPosts() {
  const grid = document.getElementById('blogGrid');
  grid.innerHTML = '<div class="loading">Loading posts...</div>';
  try {
    const res = await fetch(SCRIPT_URL);
    const text = await res.text();
    console.log("Raw:", text.substring(0,200));
    let data;
    try { data = JSON.parse(text); } catch(e) {
      grid.innerHTML = '<div class="error">Invalid JSON<br><button onclick="loadPosts()">Retry</button></div>'; return;
    }
    if (data.error) {
      grid.innerHTML = '<div class="error">' + data.error + '<br><button onclick="loadPosts()">Retry</button></div>'; return;
    }
    if (!Array.isArray(data)) {
      grid.innerHTML = '<div class="error">Unexpected format<br><button onclick="loadPosts()">Retry</button></div>'; return;
    }
    allPosts = data.sort((a,b) => new Date(b.date) - new Date(a.date));
    renderPosts('all');
  } catch(err) {
    grid.innerHTML = '<div class="error">' + err.message + '<br><button onclick="loadPosts()">Retry</button></div>';
  }
}

function renderPosts(filter) {
  const grid = document.getElementById('blogGrid');
  const filtered = filter === 'all' ? allPosts : allPosts.filter(p => p.category === filter);
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="loading">No posts found. Write one in the admin page!</div>'; return;
  }
  grid.innerHTML = filtered.map((post, idx) => `
    <div class="blog-card reveal-scale stagger-${Math.min(idx % 6 + 1, 6)}" onclick="openModal(${post.id})">
      <div class="blog-img-wrap">
        <img class="blog-img" src="${post.image || ''}" alt="${post.title}" onerror="this.style.display='none'">
      </div>
      <div class="blog-body">
        <div class="blog-meta">
          <span class="blog-category">${post.category}</span>
          <span>${formatDate(post.date)}</span>
        </div>
        <h3>${post.title}</h3>
        <p>${post.excerpt}</p>
        <span class="read-more">Read Article →</span>
      </div>
    </div>
  `).join('');
  
  // Trigger reveal animations for new cards
  setTimeout(() => {
    document.querySelectorAll('.reveal-scale').forEach(el => {
      const o = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting){
            entry.target.classList.add('revealed');
            o.unobserve(entry.target);
          }
        });
      }, {threshold:0.1});
      o.observe(el);
    });
  }, 100);
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
}

function filterPosts(category) {
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderPosts(category);
}

function openModal(id) {
  const post = allPosts.find(p => p.id == id);
  if(!post) return;
  document.getElementById('modalImg').src = post.image || '';
  document.getElementById('modalCategory').textContent = post.category;
  document.getElementById('modalDate').textContent = formatDate(post.date);
  document.getElementById('modalTitle').textContent = post.title;
  document.getElementById('modalContent').innerHTML = post.content || post.processedContent || '<p>No content.</p>';
  document.getElementById('postModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if(e && e.target !== e.currentTarget) return;
  document.getElementById('postModal').classList.remove('active');
  document.body.style.overflow = '';
}

/* Scroll Progress */
(function(){
  const p = document.getElementById('scrollProgress');
  let ticking = false;
  window.addEventListener('scroll', () => {
    if(!ticking){
      requestAnimationFrame(() => {
        p.style.width = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100 + '%';
        ticking = false;
      });
      ticking = true;
    }
  }, {passive:true});
})();

/* Initial load */
loadPosts();
</script>
</body>
</html>
